name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply Terraform And Republish Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: python -m pip install --upgrade pip boto3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/bruce-quotes-github-terraform-apply
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: latest

      - name: Terraform Init
        run: terraform init
        timeout-minutes: 10

      - name: Package And Upload Lambda Artifacts
        run: python tools/publish_lambda.py

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Republish Static Site
        if: steps.apply.outcome == 'success'
        run: |
          FUNCTION_NAME="$(terraform output -raw page_generator_function_name)"
          python tools/invoke_page_generator.py \
            --region "us-east-2" \
            --function-name "${FUNCTION_NAME}"

      - name: Create Job Summary
        if: always()
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
