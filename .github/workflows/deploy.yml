name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply Terraform And Republish Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: python -m pip install --upgrade pip boto3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/bruce-quotes-github-terraform-apply
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: latest

      - name: Terraform Init
        run: terraform init
        timeout-minutes: 10

      - name: Package And Upload Lambda Artifacts
        run: python tools/publish_lambda.py

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Republish Static Site
        if: steps.apply.outcome == 'success'
        run: |
          FUNCTION_NAME="$(terraform output -raw page_generator_function_name)"
          python tools/invoke_page_generator.py \
            --region "us-east-2" \
            --function-name "${FUNCTION_NAME}"

      - name: Create Job Summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "## Deploy Results"
            echo
            echo "**Status:** $JOB_STATUS"
            echo "**Ref:** main"
            echo "**Commit:** $(git rev-parse HEAD)"
          } >> "$GITHUB_STEP_SUMMARY"
