name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-context:
    name: Compute Deploy Context
    runs-on: ubuntu-latest

    outputs:
      should_publish: ${{ steps.context.outputs.should_publish }}
      should_apply: ${{ steps.context.outputs.should_apply }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Compute Deploy Context
        id: context
        run: |
          python tools/compute_deploy_context.py --output deploy-context.json
          python - <<'PY'
          import json
          import os

          with open("deploy-context.json", encoding="utf-8") as handle:
              context = json.load(handle)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_publish={'true' if context['should_publish'] else 'false'}\n")
              handle.write(f"should_apply={'true' if context['should_apply'] else 'false'}\n")
          PY

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
            lambda/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('lambda/pyproject.toml', 'lambda/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv venv .venv --clear
          . .venv/bin/activate
          uv pip install -e '.[dev]'

      - name: Run tests
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv run pytest -v --cov=. --cov-report=term-missing

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
            lambda/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('lambda/pyproject.toml', 'lambda/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv venv .venv --clear
          . .venv/bin/activate
          uv pip install -e '.[dev]'

      - name: Run mypy
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv run mypy app.py page_generator.py ../tools/publish_lambda.py

  terraform:
    name: Terraform Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: latest

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --config=.tflint.hcl

  deploy:
    name: Publish Lambda Artifacts & Apply Terraform
    runs-on: ubuntu-latest
    needs: [deploy-context, test, typecheck, terraform]
    if: ${{ needs.deploy-context.outputs.should_apply == 'true' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: python -m pip install --upgrade pip boto3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/bruce-quotes-github-terraform-apply
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: latest

      - name: Terraform Init
        run: terraform init
        timeout-minutes: 10

      - name: Package And Upload Artifacts If Changed
        if: needs.deploy-context.outputs.should_publish == 'true'
        run: python tools/publish_lambda.py

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false

      - name: Republish Static Site
        if: steps.apply.outcome == 'success'
        run: |
          FUNCTION_NAME="$(terraform output -raw page_generator_function_name)"
          python tools/invoke_page_generator.py \
            --region "us-east-2" \
            --function-name "${FUNCTION_NAME}"

      - name: Create Job Summary
        if: always()
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Published Lambda Artifacts:** ${{ needs.deploy-context.outputs.should_publish }}" >> $GITHUB_STEP_SUMMARY
          echo "**Applied Terraform:** ${{ needs.deploy-context.outputs.should_apply }}" >> $GITHUB_STEP_SUMMARY
