name: Publish Lambda

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  AWS_REGION: us-east-2

concurrency:
  group: the-one-group-to-rule-them-all
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Lambda Artifacts
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Download Deploy Context
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: deploy-context

      - name: Read Deploy Context
        id: changes
        run: |
          python - <<'PY'
          import json
          import os

          with open("deploy-context.json", encoding="utf-8") as handle:
              context = json.load(handle)

          print(json.dumps(context, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_publish={'true' if context['should_publish'] else 'false'}\n")
              handle.write(f"should_apply={'true' if context['should_apply'] else 'false'}\n")
          PY

      - name: Setup Python
        if: steps.changes.outputs.should_publish == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        if: steps.changes.outputs.should_publish == 'true'
        run: python -m pip install --upgrade pip boto3

      - name: Configure AWS Credentials
        if: steps.changes.outputs.should_publish == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/bruce-quotes-github-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.changes.outputs.should_publish == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Terraform Init
        if: steps.changes.outputs.should_publish == 'true'
        run: terraform init
        timeout-minutes: 10

      - name: Package And Upload Artifacts If Changed
        id: upload
        if: steps.changes.outputs.should_publish == 'true'
        run: |
          python tools/publish_lambda.py

      - name: Upload Deploy Context
        uses: actions/upload-artifact@v7
        with:
          name: deploy-context
          path: deploy-context.json
          retention-days: 1

      - name: Skip Publish Summary
        if: steps.changes.outputs.should_publish != 'true'
        run: |
          echo "## Publish Lambda Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No Lambda source changes detected for commit \`${{ github.event.workflow_run.head_sha }}\`. Skipping artifact publish." >> "$GITHUB_STEP_SUMMARY"

      - name: Create Job Summary
        if: always() && steps.changes.outputs.should_publish == 'true'
        run: |
          echo "## Publish Lambda Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.workflow_run.head_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Lambda artifacts published. Terraform apply runs in a separate workflow." >> $GITHUB_STEP_SUMMARY
