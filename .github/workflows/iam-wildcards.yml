name: Expand IAM Wildcards

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  expand-wildcards:
    runs-on: ubuntu-latest
    steps:
      - name: Expand IAM Wildcards
        uses: thekbb/expand-iam-wildcards@3b2844e1c5431ae7ec639df6e82f47daff96029b # v1.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
