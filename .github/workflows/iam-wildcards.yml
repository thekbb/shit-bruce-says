name: Expand IAM Wildcards

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  expand-wildcards:
    runs-on: ubuntu-latest
    steps:
      - name: Expand IAM Wildcards
        uses: thekbb/expand-iam-wildcards@6a258beccb07c77eb33926156d4eb5154f57e1cb # v1.2.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
