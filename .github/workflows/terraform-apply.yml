name: Terraform Apply

on:
  workflow_run:
    workflows: ["Publish Lambda"]
    types:
      - completed

env:
  AWS_REGION: us-east-2

concurrency:
  group: the-one-group-to-rule-them-all
  cancel-in-progress: false

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Download Deploy Context
        uses: dawidd6/action-download-artifact@v19
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: deploy-context

      - name: Read Deploy Context
        id: changes
        run: |
          python - <<'PY'
          import json
          import os

          with open("deploy-context.json", encoding="utf-8") as handle:
              context = json.load(handle)

          print(json.dumps(context, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"should_apply={'true' if context['should_apply'] else 'false'}\n")
          PY

      - name: Configure AWS Credentials
        if: steps.changes.outputs.should_apply == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/bruce-quotes-github-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.changes.outputs.should_apply == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Terraform Init
        if: steps.changes.outputs.should_apply == 'true'
        run: terraform init
        timeout-minutes: 10

      - name: Terraform Format Check
        if: steps.changes.outputs.should_apply == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: steps.changes.outputs.should_apply == 'true'
        run: terraform validate -no-color

      - name: Terraform Apply
        id: apply
        if: steps.changes.outputs.should_apply == 'true'
        run: terraform apply -auto-approve -input=false

      - name: Skip Apply Summary
        if: steps.changes.outputs.should_apply != 'true'
        run: |
          echo "## Terraform Apply Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No Terraform or Lambda deployment changes detected for commit \`${{ github.event.workflow_run.head_sha }}\`. Skipping apply." >> "$GITHUB_STEP_SUMMARY"

      - name: Create Job Summary
        if: always() && steps.changes.outputs.should_apply == 'true'
        run: |
          echo "## Terraform Apply Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.workflow_run.head_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "Infrastructure successfully updated!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_I love it when a plan comes together._ 🚬" >> $GITHUB_STEP_SUMMARY
          else
            echo "Apply failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi
